<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SolidOS UI Demo</title>
    <style>
      body {
        font-family: system-ui, sans-serif;
        background: var(--color-surface, #fff);
        color: var(--color-text, #111);
        padding: 2rem;
        transition: background 0.2s, color 0.2s;
      }

      .demo-grid {
        display: grid;
        gap: 1rem;
        grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
        margin-top: 1rem;
      }

      .panel {
        border: 1px solid rgba(0, 0, 0, 0.08);
        border-radius: 1rem;
        padding: 1rem;
        background: var(--color-surface-muted, #f9f9fb);
      }

      .demo-row {
        display: flex;
        align-items: center;
        gap: 0.75rem;
        flex-wrap: wrap;
      }

      button {
        margin-top: 1rem;
        padding: 0.6rem 1rem;
        border: none;
        border-radius: 999px;
        background: var(--color-primary, #3b82f6);
        color: white;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <h1>SolidOS UI Demo</h1>
    <p>A minimal webpack demo showing `@solidos/ui` with theme tokens and icon utilities.</p>

    <div class="demo-grid">
      <section class="panel">
        <h2>UI Icons</h2>
        <div id="icons" class="demo-row"></div>
      </section>

      <section class="panel">
        <h2>Logo</h2>
        <div id="logo"></div>
      </section>
    </div>

    <button id="theme-toggle">Toggle light / dark theme</button>
  </body>
</html>
